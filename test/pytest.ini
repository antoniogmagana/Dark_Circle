[pytest]
# Pytest configuration for Dark Circle test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add current directory and parent directories to Python path
pythonpath = . ../model-train ../ensemble-train ../server-load

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Warnings
    -W ignore::DeprecationWarning
    # Coverage options (uncomment to enable)
    # --cov=../model-train
    # --cov=../ensemble-train
    # --cov=../server-load
    # --cov-report=html
    # --cov-report=term-missing

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external resources)
    slow: Slow tests (>1 second)
    db: Tests requiring database connection
    gpu: Tests requiring GPU/CUDA
    
# Ignore warnings from specific packages
filterwarnings =
    ignore::DeprecationWarning:torch.*
    ignore::UserWarning:torch.*
    ignore::FutureWarning:numpy.*

# Timeout for tests (optional, requires pytest-timeout)
# timeout = 300

# Parallel execution (requires pytest-xdist)
# Can be overridden with -n flag
# addopts = -n auto

# Test output
console_output_style = progress

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage configuration
[coverage:run]
source = ../model-train,../ensemble-train,../server-load
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
