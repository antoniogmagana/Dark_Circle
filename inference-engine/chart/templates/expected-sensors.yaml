# Sensor whitelist consumed by the Discovery node. Edit ``expectedSensors``
# in values.yaml; the chart renders this ConfigMap from those entries.
apiVersion: v1
kind: ConfigMap
metadata:
  name: expected-sensors
data:
  expected-sensors.yaml: |
    arrays:
{{- range $arrayId, $spec := .Values.expectedSensors }}
      {{ $arrayId }}:
        audio: {{ $spec.audio }}
        seismic: {{ $spec.seismic }}
{{- if $spec.accel }}
        accel:
          {{- /* Use index to look up keys by string, defensive against
                 YAML 1.1 quirks where bare ``y``/``n`` parse as booleans
                 and become the wrong map key. */ -}}
          x: {{ index $spec.accel "x" }}
          y: {{ index $spec.accel "y" }}
          z: {{ index $spec.accel "z" }}
{{- end }}
{{- end }}
