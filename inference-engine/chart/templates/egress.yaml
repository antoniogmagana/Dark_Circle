apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress
  labels:
    app: egress
spec:
  replicas: {{ .Values.inference.egress.replicas }}
  selector:
    matchLabels:
      app: egress
  template:
    metadata:
      labels:
        app: egress
    spec:
      {{- include "inference-engine.imagePullSecrets" . | nindent 6 }}
      {{- include "inference-engine.hostNetwork" . | nindent 6 }}
      containers:
        - name: egress
          image: {{ include "inference-engine.image" (dict "name" "egress" "Values" .Values) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            {{- include "inference-engine.fastddsEnv" . | nindent 12 }}
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          volumeMounts:
            {{- include "inference-engine.fastddsMount" . | nindent 12 }}
          resources:
            {{- toYaml .Values.inference.egress.resources | nindent 12 }}
      volumes:
        {{- include "inference-engine.fastddsVolume" . | nindent 8 }}
{{- if .Values.keda.enabled }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: egress
  labels:
    app: egress
spec:
  scaleTargetRef:
    name: egress
  minReplicaCount: {{ .Values.inference.egress.minReplicas }}
  maxReplicaCount: {{ .Values.inference.egress.maxReplicas }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  triggers:
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: "nats-service.{{ .Release.Namespace }}.svc.cluster.local:8222"
        account: "$G"
        stream: "DETECTION_RESULT"
        consumer: "egress-detection"
        lagThreshold: "{{ .Values.keda.lagThreshold }}"
{{- end }}
