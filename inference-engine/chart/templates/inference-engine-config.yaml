# Unified, customer-facing runtime configuration. Values are pulled from
# the chart's values.yaml — edit there, not here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-engine-config
data:
  ROS_DOMAIN_ID: "{{ .Values.ros2.domainId }}"
  RMW_IMPLEMENTATION: {{ .Values.ros2.rmwImplementation | quote }}
  INFERENCE_RESULT_TOPIC: {{ .Values.ros2.outputTopic | quote }}
  NATS_URL: {{ .Values.nats.url | quote }}
  {{- if .Values.ros2.fastddsBuiltinTransports }}
  FASTDDS_BUILTIN_TRANSPORTS: {{ .Values.ros2.fastddsBuiltinTransports | quote }}
  {{- end }}
---
# fastdds-profiles is always rendered (even when empty) because the
# Ingestor Deployment template baked into the Discovery image
# unconditionally mounts it. An empty XML is fine — FastDDS falls back
# to its built-in defaults, which combined with FASTDDS_BUILTIN_TRANSPORTS=UDPv4
# is exactly what the kind smoke test needs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastdds-profiles
data:
  fastdds.xml: |
{{ .Values.ros2.fastddsProfile | default "" | indent 4 }}
{{- if .Values.ros2.egress.fastddsProfile }}
---
# Egress-only FastDDS profile. Rendered only when ros2.egress.fastddsProfile
# is set in values.yaml. Mounted exclusively by the egress Deployment so
# downstream subscribers can sit on a different DDS network from the
# sensor side without affecting how the ingestor discovers Raspberry
# Shake topics.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastdds-profiles-egress
data:
  fastdds.xml: |
{{ .Values.ros2.egress.fastddsProfile | indent 4 }}
{{- end }}
