apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery
  labels:
    app: discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery
  template:
    metadata:
      labels:
        app: discovery
    spec:
      {{- include "inference-engine.imagePullSecrets" . | nindent 6 }}
      {{- include "inference-engine.hostNetwork" . | nindent 6 }}
      serviceAccountName: discovery-sa
      containers:
        - name: discovery
          image: {{ include "inference-engine.image" (dict "name" "discovery" "Values" .Values) }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TEMPLATE_PATH
              value: /app/ingestor-template.yaml
            - name: CONFIG_PATH
              value: /etc/inference-engine/expected-sensors.yaml
            {{- include "inference-engine.fastddsEnv" . | nindent 12 }}
          volumeMounts:
            - name: expected-sensors
              mountPath: /etc/inference-engine
              readOnly: true
            {{- include "inference-engine.fastddsMount" . | nindent 12 }}
          resources:
            {{- toYaml .Values.discovery.resources | nindent 12 }}
      volumes:
        - name: expected-sensors
          configMap:
            name: expected-sensors
        {{- include "inference-engine.fastddsVolume" . | nindent 8 }}
