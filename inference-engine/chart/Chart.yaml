apiVersion: v2
name: inference-engine
description: |
  Containerized vehicle detection + classification inference pipeline for
  acoustic and seismic sensors. Subscribes to ROS2 sensor topics, runs
  CRL-trained models, and publishes inference results back to a ROS2
  output topic for downstream consumers.
