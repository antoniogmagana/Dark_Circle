syntax = "proto3";

package inference;

// import google timestamp protobuf structure
import google/protobuf/timestamp.proto;

// generic tensor structure
message Tensor {
    repeated int32 shape = 1;
    repeated float data = 2;
}

// Sent from Ingestor to Detector node
message SensorData {
    string sensor_id = 1;
    repeated string channels = 2;
    google/protobuf/Timestamp time_stamp = 3;
    optional Tensor acoustic_data = 4;
    optional Tensor seismic_data = 5;
    optional Tensor accel_data = 6;
}

// Sent from Detector to Classifier (if vehicle == true)
message DetectionResult {
    SensorData = 1;
    bool vehicle_detected = 2;
    float confidence = 3;
}

// Sent from Classifier and Detector to Egress node
message EgressPayload {
    string sensor_id = 1;
    google/protobuf/Timestamp timestamp = 2;
    bool vehicle_detected = 3;
    string vehicle_class = 4;
    float detection_confidence = 5;
    float classification_confidence = 6;
}

// Packet receipt acknowledgement
message Ack {
    bool success = 1;
    string message = 2;
}

// gRPC services
service InferencePipeline {
    // Ingestor call to Detector
    rpc RunDetection(SensorData) returns (Ack);

    // Detector call to Classifier
    rpc RunClassification(DetectionResult) returns (Ack);

    // Detector or Classifier call to Egress node
    rpc SendToEgress(EgressPayload) returns (Ack);
}

