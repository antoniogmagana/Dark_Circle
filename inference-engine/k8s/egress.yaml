# Egress Node
# Subscribes to NATS detection.result + classification.result via JetStream
# durable consumers (queue group "egress"), bridges results back to ROS2 on
# /inference_result. One ROS2 message per inference window: classifier owns
# positives, detection node's negatives surface here. Replica count is
# managed by the matching KEDA ScaledObject in k8s/keda/.
#
# hostNetwork is intentionally absent. On macOS+kind users may need to
# re-add ``hostNetwork: true`` + ``dnsPolicy: ClusterFirstWithHostNet`` for
# DDS multicast to reach the publishers — see README §DDS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress
  labels:
    app: egress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: egress
  template:
    metadata:
      labels:
        app: egress
    spec:
      # DDS multicast does not traverse Calico-VXLAN, so kind-based smoke
      # tests need hostNetwork. Customers on a multicast-capable CNI can
      # drop hostNetwork and rely on FASTRTPS_DEFAULT_PROFILES_FILE alone.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: egress
          image: inference-engine/egress:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: FASTRTPS_DEFAULT_PROFILES_FILE
              value: "/etc/fastdds/fastdds.xml"
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - name: fastdds-profiles
              mountPath: /etc/fastdds
              readOnly: true
      volumes:
        - name: fastdds-profiles
          configMap:
            # OPTIONAL: split-egress DDS network. To give the egress pod
            # its own FastDDS profile (different unicast peers / multicast
            # scope from the ingestor side), change this name to
            # ``fastdds-profiles-egress`` and uncomment the matching
            # ConfigMap stub at the bottom of k8s/inference-engine-config.yaml.
            # The Helm chart exposes this as ros2.egress.fastddsProfile.
            name: fastdds-profiles
