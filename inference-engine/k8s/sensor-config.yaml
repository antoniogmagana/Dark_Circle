apiVersion: v1
kind: ConfigMap
metadata:
  name: sensor-config
  namespace: default
data:
  audio_bit_depth: "16"
  seismic_bit_depth: "24"
  accel_bit_depth: "24"
  # Per-channel native sample rates moved to ingestor-channel-map ConfigMap.
  # target_rate still governs resampling when NATIVE_RATES != "1".
  target_rate: "16000"
