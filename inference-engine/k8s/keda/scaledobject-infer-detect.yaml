# KEDA scales infer-detect on the SENSOR_DATA stream's ``infer-detect``
# durable consumer pending count. Threshold is per-replica: when pending
# exceeds 50 messages, KEDA adds another replica up to maxReplicaCount.
# minReplicaCount=1 keeps a baseline so the consumer doesn't disappear and
# stop draining the stream during quiet periods.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: infer-detect
  labels:
    app: infer-detect
spec:
  scaleTargetRef:
    name: infer-detect
  minReplicaCount: 1
  maxReplicaCount: 3
  pollingInterval: 10
  # Long cooldown so brief idle gaps don't churn replicas; combined with
  # min=1 and the readiness-probe gating, a Ready replica stays warm.
  cooldownPeriod: 300
  triggers:
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: "nats-service.default.svc.cluster.local:8222"
        account: "$G"
        stream: "SENSOR_DATA"
        consumer: "infer-detect"
        lagThreshold: "50"
