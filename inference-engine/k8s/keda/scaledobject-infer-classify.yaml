# KEDA scales infer-classify on DETECTION_RESULT stream pending count.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: infer-classify
  labels:
    app: infer-classify
spec:
  scaleTargetRef:
    name: infer-classify
  minReplicaCount: 1
  maxReplicaCount: 3
  pollingInterval: 10
  cooldownPeriod: 300
  triggers:
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: "nats-service.default.svc.cluster.local:8222"
        account: "$G"
        stream: "DETECTION_RESULT"
        consumer: "infer-classify"
        lagThreshold: "50"
