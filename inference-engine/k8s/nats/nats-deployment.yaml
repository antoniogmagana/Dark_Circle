apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10
          # JetStream gives us persisted streams with named consumers, which
          # KEDA reads via the HTTP monitoring endpoint (-m 8222) to scale
          # infer-detect / infer-classify / egress on backlog depth.
          # Storage lives on emptyDir; a real cluster should mount a PVC.
          args:
            - "-js"
            - "-sd"
            - "/tmp/nats"
            - "-m"
            - "8222"
          ports:
            - containerPort: 4222
            - containerPort: 8222
          volumeMounts:
            - name: jetstream-store
              mountPath: /tmp/nats
      volumes:
        - name: jetstream-store
          emptyDir: {}
