# Inference — Detection Node
# Subscribes to NATS JetStream sensor.data via the ``infer-detect`` durable
# consumer (queue group). Publishes DetectionResult to detection.result.
# Replica count is owned by k8s/keda/scaledobject-infer-detect.yaml.
#
# Model artifacts (TorchScript) are baked into the image during
# ``docker build`` from build/crl-export/, populated by
# scripts/build_containers.sh from a saved CRL run.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-detect
  labels:
    app: infer-detect
spec:
  selector:
    matchLabels:
      app: infer-detect
  template:
    metadata:
      labels:
        app: infer-detect
    spec:
      containers:
        - name: infer-detect
          image: inference-engine/infer-detect:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: MODEL_DIR
              value: "/app/model"
