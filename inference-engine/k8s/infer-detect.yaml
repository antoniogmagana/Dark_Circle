# Inference — Detection Node
# Subscribes to NATS JetStream sensor.data via the ``infer-detect`` durable
# consumer (queue group). Publishes DetectionResult to detection.result.
# Replica count is owned by k8s/keda/scaledobject-infer-detect.yaml.
#
# Model artifacts (TorchScript) are baked into the image during
# ``docker build`` from build/detect-export/, populated by
# scripts/build_containers.sh from the bundle named by DETECT_BUNDLE
# (default: detect-default).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-detect
  labels:
    app: infer-detect
spec:
  # Belt-and-suspenders floor: if KEDA is uninstalled or its CRD goes
  # missing, the Deployment still maintains 1 replica so the customer's
  # pipeline doesn't silently scale to zero.
  replicas: 1
  selector:
    matchLabels:
      app: infer-detect
  template:
    metadata:
      labels:
        app: infer-detect
    spec:
      containers:
        - name: infer-detect
          image: inference-engine/infer-detect:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: MODEL_DIR
              value: "/app/model"
          # Sentinel-file readiness: the pod becomes Ready only after
          # the model is loaded and JetStream subscription is bound. With
          # KEDA min=1, this means a Ready pod is one that can actually
          # infer immediately — no warm-up delay surfaces to the customer.
          readinessProbe:
            exec:
              command: ["test", "-f", "/tmp/ready"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
