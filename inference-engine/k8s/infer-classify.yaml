# Inference — Classification Node
# Subscribes to NATS detection.result, runs ClassificationCNN (Mel input),
# publishes EgressPayload to NATS classification.result.
# Only processes windows where vehicle_detected == True.
#
# Model artifacts (best_model.pth, meta.pt, hyperparameters.json) must be
# written to the PVC before the pod starts. Populate from:
#   model-train/saved_models/category/ClassificationCNN/<RUN_ID>/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-classify
  labels:
    app: infer-classify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infer-classify
  template:
    metadata:
      labels:
        app: infer-classify
    spec:
      containers:
        - name: infer-classify
          image: your-registry/infer-classify:latest   # update with your registry
          env:
            - name: NATS_URL
              value: "nats://nats-service:4222"
            - name: MODEL_DIR
              value: "/app/model"
          volumeMounts:
            - name: model
              mountPath: /app/model
              readOnly: true
      volumes:
        - name: model
          persistentVolumeClaim:
            claimName: infer-classify-model-pvc
---
# PVC for classification model artifacts.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infer-classify-model-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
