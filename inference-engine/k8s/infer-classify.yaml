# Inference — Classification Node
# Subscribes to JetStream detection.result via the ``infer-classify``
# durable consumer (queue group), runs the type head only on positives,
# publishes EgressPayload to classification.result. Replica count is
# owned by k8s/keda/scaledobject-infer-classify.yaml.
#
# Model artifacts are baked into the image during ``docker build`` from
# build/crl-export/, same bundle as infer-detect.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-classify
  labels:
    app: infer-classify
spec:
  selector:
    matchLabels:
      app: infer-classify
  template:
    metadata:
      labels:
        app: infer-classify
    spec:
      containers:
        - name: infer-classify
          image: inference-engine/infer-classify:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: MODEL_DIR
              value: "/app/model"
