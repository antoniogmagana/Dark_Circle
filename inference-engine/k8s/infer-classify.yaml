# Inference — Classification Node
# Subscribes to JetStream detection.result via the ``infer-classify``
# durable consumer (queue group). On positive detections, re-encodes the
# raw waveform from sensor_data and runs the type head; publishes
# EgressPayload to classification.result. Replica count is owned by
# k8s/keda/scaledobject-infer-classify.yaml.
#
# Model artifacts are baked into the image during ``docker build`` from
# build/classify-export/, populated by scripts/build_containers.sh from
# the bundle named by CLASSIFY_BUNDLE (default: classify-default).
# Classify selects independently of infer-detect; the bundles may come
# from the same CRL run or different runs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infer-classify
  labels:
    app: infer-classify
spec:
  selector:
    matchLabels:
      app: infer-classify
  template:
    metadata:
      labels:
        app: infer-classify
    spec:
      containers:
        - name: infer-classify
          image: inference-engine/infer-classify:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: MODEL_DIR
              value: "/app/model"
