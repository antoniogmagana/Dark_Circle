# Ingestor Deployment template, baked into the Discovery image at
# /app/ingestor-template.yaml. Discovery loads this once at startup, then
# clones-and-mutates it per sensor array (see whitelist.build_ingestor_manifest).
# The sensor_array placeholder values below are overwritten at spawn time;
# they exist only so this YAML parses cleanly on its own.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor-placeholder
  labels:
    app: ingestor
    sensor-array: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestor
      sensor-array: placeholder
  template:
    metadata:
      labels:
        app: ingestor
        sensor-array: placeholder
    spec:
      # DDS multicast does not traverse Calico-VXLAN, so kind-based smoke
      # tests need hostNetwork even on Linux.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: ingestor
          image: inference-engine/ingestor:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: NATIVE_RATES
              value: "1"
            - name: SENSOR_ARRAY
              value: "placeholder"
            - name: SENSOR_ROLE_MAP
              value: "{}"
            - name: AUDIO_BIT_DEPTH
              valueFrom:
                configMapKeyRef:
                  name: sensor-config
                  key: audio_bit_depth
            - name: SEISMIC_BIT_DEPTH
              valueFrom:
                configMapKeyRef:
                  name: sensor-config
                  key: seismic_bit_depth
            - name: ACCEL_BIT_DEPTH
              valueFrom:
                configMapKeyRef:
                  name: sensor-config
                  key: accel_bit_depth
            - name: AUDIO_SAMPLE_RATE
              valueFrom:
                configMapKeyRef:
                  name: sensor-config
                  key: audio_sample_rate
            - name: SEISMIC_SAMPLE_RATE
              valueFrom:
                configMapKeyRef:
                  name: sensor-config
                  key: seismic_sample_rate
            - name: ACCEL_SAMPLE_RATE
              valueFrom:
                configMapKeyRef:
                  name: sensor-config
                  key: accel_sample_rate
            - name: target_rate
              valueFrom:
                configMapKeyRef:
                  name: sensor-config
                  key: target_rate
