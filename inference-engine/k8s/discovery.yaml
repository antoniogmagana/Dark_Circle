apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery
  labels:
    app: discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery
  template:
    metadata:
      labels:
        app: discovery
    spec:
      # DDS multicast does not traverse Calico-VXLAN, so kind-based smoke
      # tests need hostNetwork even on Linux. A real cluster on a
      # multicast-capable CNI (Calico in IP-in-IP mode, Cilium, Flannel
      # with multicast, etc.) can drop hostNetwork and use
      # FASTRTPS_DEFAULT_PROFILES_FILE for unicast peers instead.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: discovery-sa
      containers:
        - name: discovery
          image: inference-engine/discovery:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TEMPLATE_PATH
              value: "/app/ingestor-template.yaml"
            - name: CONFIG_PATH
              value: "/etc/inference-engine/expected-sensors.yaml"
          volumeMounts:
            - name: expected-sensors
              mountPath: /etc/inference-engine
              readOnly: true
      volumes:
        - name: expected-sensors
          configMap:
            name: expected-sensors
