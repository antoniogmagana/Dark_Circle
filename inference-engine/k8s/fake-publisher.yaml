# Fake ROS2 publisher for local smoke testing only.
# Lives in-cluster so DDS multicast stays on the kind pod network.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-publisher
  labels:
    app: fake-publisher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fake-publisher
  template:
    metadata:
      labels:
        app: fake-publisher
    spec:
      # DDS multicast does not traverse Calico-VXLAN, so kind-based smoke
      # tests need hostNetwork even on Linux.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: fake-publisher
          image: inference-engine/fake-publisher:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: inference-engine-config
          env:
            - name: FAKE_TOPICS
              value: "/shake_001/aud,/shake_001/ehz,/shake_001/ene,/shake_001/enn,/shake_001/enz"
            - name: FAKE_RATE_HZ
              value: "10"
            - name: FASTRTPS_DEFAULT_PROFILES_FILE
              value: "/etc/fastdds/fastdds.xml"
          volumeMounts:
            - name: fastdds-profiles
              mountPath: /etc/fastdds
              readOnly: true
      volumes:
        - name: fastdds-profiles
          configMap:
            name: fastdds-profiles
