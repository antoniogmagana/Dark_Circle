[pytest]
# Pytest configuration for inference-engine tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (mock external systems)
    asyncio: Async tests requiring pytest-asyncio
    ros2: Tests requiring ROS2 mocking
    nats: Tests requiring NATS mocking
    k8s: Tests requiring Kubernetes API mocking
    slow: Tests that take significant time to run

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Test paths
testpaths = tests

# Async configuration
asyncio_mode = auto

# Coverage options (when using --cov)
[coverage:run]
source = ../src
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
